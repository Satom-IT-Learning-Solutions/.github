name: 👋 Welcome New Repo

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome repos created in the last 24h
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SNAKE_TOKEN }}
          script: |
            const { data: repos } = await github.rest.repos.listForOrg({
              org: "Satom-IT-Learning-Solutions",
              per_page: 100,
              sort: "created",
              direction: "desc"
            });

            const since = new Date(Date.now() - 24 * 60 * 60 * 1000);

            const body = [
              "## Checklist de démarrage",
              "",
              "Salut ! Voici quelques rappels pour bien démarrer",
              "",
              "### Nom du repo",
              "Le nom doit suivre la convention :",
              "```",
              "[nom]-[sujet]",
              "# Exemples : thomas-iot-hackathon / sarah-vlan-lab",
              "```",
              "",
              "### Commits",
              "Merci d'utiliser le format conventionnel :",
              "```",
              "feat: description de la nouveaute",
              "fix: ce qui a ete corrige",
              "docs: mise a jour de la documentation",
              "lab: exercice complete",
              "```",
              "",
              "### Branches",
              "- `main` -> version stable / rendu final",
              "- `dev` -> travail en cours",
              "- `feature/nom` -> fonctionnalite specifique",
              "",
              "### README",
              "Pense a ajouter un README.md qui explique a quoi sert ce repo.",
              "",
              "---",
              "*Message automatique - Satom IT & Learning Solutions*"
            ].join("\n");

            for (const repo of repos) {
              const createdAt = new Date(repo.created_at);
              if (createdAt < since) break;

              const { data: issues } = await github.rest.issues.listForRepo({
                owner: repo.owner.login,
                repo: repo.name,
                state: "all",
                per_page: 10
              });

              const alreadyWelcomed = issues.some(i => i.title === "Bienvenue dans ce repo !");
              if (alreadyWelcomed) continue;

              await github.rest.issues.create({
                owner: repo.owner.login,
                repo: repo.name,
                title: "Bienvenue dans ce repo !",
                body: body
              });

              console.log("Issue de bienvenue creee sur : " + repo.name);
            }
