name: 🔥 Update Top Repos

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SNAKE_TOKEN }}

      - name: Fetch top repos and update README
        env:
          GH_TOKEN: ${{ secrets.SNAKE_TOKEN }}
          ORG: Satom-IT-Learning-Solutions
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          import re
          from datetime import datetime, timezone

          token = os.environ["GH_TOKEN"]
          org   = os.environ["ORG"]

          # Appel API GitHub — tous les repos de l'org
          req = urllib.request.Request(
              f"https://api.github.com/orgs/{org}/repos?per_page=100&sort=pushed&direction=desc",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28"
              }
          )
          with urllib.request.urlopen(req) as r:
              repos = json.loads(r.read())

          # Filtrer les forks et repos vides, trier par pushed_at
          repos = [r for r in repos if not r["fork"] and r["pushed_at"]]
          repos = sorted(repos, key=lambda r: r["pushed_at"], reverse=True)[:3]

          # Générer le bloc Markdown
          lines = []
          medals = ["🥇", "🥈", "🥉"]
          for i, repo in enumerate(repos):
            name        = repo["name"]
            description = repo["description"] or "Pas de description"
            stars       = repo["stargazers_count"]
            forks       = repo["forks_count"]
            language    = repo["language"] or "—"
            pushed      = repo["pushed_at"][:10]
            url         = repo["html_url"]

            lines.append(f"### {medals[i]} [{name}]({url})")
            lines.append(f"> {description}")
            lines.append(f"")
            lines.append(f"![Language](https://img.shields.io/badge/Langage-{language.replace(' ', '_')}-0d47a1?style=flat-square) "
                         f"![Stars](https://img.shields.io/badge/⭐_Stars-{stars}-ffd700?style=flat-square) "
                         f"![Forks](https://img.shields.io/badge/🍴_Forks-{forks}-1565c0?style=flat-square) "
                         f"![Updated](https://img.shields.io/badge/Dernier_push-{pushed}-1976d2?style=flat-square)")
            lines.append("")

          now = datetime.now(timezone.utc).strftime("%d/%m/%Y à %H:%M UTC")
          lines.append(f"<sub>Mis à jour automatiquement le {now}</sub>")

          new_block = "\n".join(lines)

          # Réécrire la section dans le README
          with open("profile/README.md", "r") as f:
              readme = f.read()

          readme = re.sub(
              r"<!-- TOP_REPOS_START -->.*?<!-- TOP_REPOS_END -->",
              f"<!-- TOP_REPOS_START -->\n{new_block}\n<!-- TOP_REPOS_END -->",
              readme,
              flags=re.DOTALL
          )

          with open("profile/README.md", "w") as f:
              f.write(readme)

          print("README mis à jour avec les 3 repos les plus actifs")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --cached --quiet || git commit -m "chore: update top active repos [skip ci]"
          git push
